<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ app_name }} - {{ app_version }}</title>
  <link rel="icon" href="{{ favicon_url }}">
  <link rel="stylesheet" href="/static/css/sd-platform.css">
  <link rel="stylesheet" href="/static/css/sd-module-unified.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">
      <img src="/static/img/sd-logo.svg" alt="Single Digits" class="logo">
      <span><strong>{{ app_name }}</strong><em>{{ app_version }}</em></span>
    </a>
    <nav>
      <a href="/site-context">Site Context</a>
      <a href="/configuration">Configuration Builder</a>
      <a href="/diagnostics">Support Diagnostics</a>
      <a href="/health">Health</a>
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <footer class="footer">Port 8010 · Modular FastAPI shell · Shared SSH/vendor/parsing/reporting libraries</footer>
</body>
</html>
